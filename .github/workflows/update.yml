name: Parse customs

on:
  workflow_dispatch:

  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write

env:
  APP_ID: "570"
  STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
  STEAM_PASSWORD: ${{ secrets.STEAM_PASSWORD }}

jobs:
  update_customs:
    name: Update customs
    runs-on: ubuntu-latest

    outputs:
      changed: ${{ steps.check.outputs.changed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y jq unzip

      - name: Install SteamCMD
        run: |
          mkdir -p "$HOME/steamcmd"

          curl -fsSL \
            https://steamcdn-a.akamaihd.net/client/installer/steamcmd_linux.tar.gz \
            | tar -xz -C "$HOME/steamcmd"

          chmod +x "$HOME/steamcmd/steamcmd.sh"

      - name: Install Source2Viewer
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p "$HOME/s2v"

          gh release download \
            --repo ValveResourceFormat/ValveResourceFormat \
            --pattern "cli-linux-x64.zip" \
            --output /tmp/s2v.zip

          unzip -oq /tmp/s2v.zip -d "$HOME/s2v"

          chmod +x "$HOME/s2v/Source2Viewer-CLI"

      - name: Process customs
        run: |
          set -euo pipefail
          CHANGED=false

          WORKDIR=$(mktemp -d)

          mapfile -t MODS < <(jq -c '.[]' versions.json)

          for row in "${MODS[@]}"; do
            ID=$(jq -r '.workshop_id' <<< "$row")
            BRANCH=$(jq -r '.branch_name' <<< "$row")

            echo "$ID -> $BRANCH"

            MOD_DIR="$WORKDIR/$ID"

            "$HOME/steamcmd/steamcmd.sh" \
              +force_install_dir "$MOD_DIR" \
              +login "$STEAM_USERNAME" "$STEAM_PASSWORD" \
              +workshop_download_item "$APP_ID" "$ID" validate \
              +quit

            CONTENT=$(find "$MOD_DIR" \
              -type d \
              -path "*/steamapps/workshop/content/$APP_ID/$ID" \
              | head -n1)

            [[ -n "$CONTENT" ]] || {
              echo "Workshop content missing"
              exit 1
            }

            VPK=$(find "$CONTENT" \
              -type f \
              -name "*.vpk" \
              | sort \
              | head -n1)

            [[ -n "$VPK" ]] || {
              echo "No VPK found"
              exit 1
            }

            OUT="$WORKDIR/extract-$ID"

            rm -rf "$OUT"
            mkdir -p "$OUT"

            LOG="$WORKDIR/s2v.log"

            if ! "$HOME/s2v/Source2Viewer-CLI" \
                -i "$VPK" \
                -o "$OUT" \
                -d \
                >"$LOG" 2>&1; then
              cat "$LOG"
              exit 1
            fi

            rm -f "$LOG"

            [[ -n "$(ls -A "$OUT")" ]] || {
              echo "Extraction empty"
              exit 1
            }

            PUBLISH="$WORKDIR/publish"

            rm -rf "$PUBLISH"
            mkdir "$PUBLISH"

            cd "$PUBLISH"

            git init

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            git remote add origin \
              "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"

            if git ls-remote --heads origin "$BRANCH" | grep -q "$BRANCH"; then
              git fetch origin "$BRANCH"
              git checkout -B "$BRANCH" "origin/$BRANCH"
            else
              git checkout --orphan "$BRANCH"
              git rm -rf . || true
            fi

            rm -rf ./*
            cp -a "$OUT"/. .

            git add -A

            if ! git diff --cached --quiet; then
              git commit -m "action: upload custom"
              git push origin "$BRANCH"

              CHANGED=true
            fi

            cd "$GITHUB_WORKSPACE"
          done
          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"

  watermark:
    name: Apply watermark
    runs-on: ubuntu-latest
    needs: update_customs
    if: needs.update_customs.outputs.changed == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply watermark to all branches
        env:
          WATERMARK_TEMPLATE: ${{ secrets.LUA_WATERMARK }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          BUILD="${GITHUB_SHA::7}"
          TIME="$(date -u '+%Y-%m-%d %H:%M:%S UTC')"

          WATERMARK=$(printf '%s' "$WATERMARK_TEMPLATE" \
            | sed \
              -e "s|\${build}|$BUILD|g" \
              -e "s|\${time}|$TIME|g")

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mapfile -t BRANCHES < <(jq -r '.[].branch_name' versions.json)

          for BRANCH in "${BRANCHES[@]}"; do
            git fetch origin "$BRANCH"
            git checkout -B "$BRANCH" "origin/$BRANCH"

            find . \
              \( -name '*.lua' -o -name '*.txt' \) \
              -not -path './.git/*' \
              | while read -r f; do

                  # защита от повторного ватермарка
                  if head -n 20 "$f" | grep -q "special thanks\|damer\|windguild"; then
                    continue
                  fi

                  printf '%s\n\n\n%s' \
                    "$WATERMARK" \
                    "$(cat "$f")" > "$f.tmp"

                  mv "$f.tmp" "$f"
              done

            if git diff --quiet; then
              echo "No changes in $BRANCH"
              continue
            fi

            git add -A
            git commit -m "action: add watermark"
            git push origin "$BRANCH"
          done
